services:
  - type: web
    name: neighbourhub-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    plan: free
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: STORAGE_PROVIDER
        value: vercel-blob
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: LOCAL_UPLOAD_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
