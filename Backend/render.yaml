services:
  - type: web
    name: neighbourhub-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
